#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
web_search = "live"
sandbox_mode = "workspace-write"

[features]
apps = true
multi_agent = true
shell_snapshot = true
unified_exec = true

[sandbox_workspace_write]
network_access = true
writable_roots = ["/home/vscode", "/workspaces/skillpup", "/tmp"]

[projects."/workspaces/skillpup"]
trust_level = "trusted"
